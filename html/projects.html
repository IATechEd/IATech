<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>IATechEd - Projects</title>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">

	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=block" rel="stylesheet">
	<link href="styles.css" rel="stylesheet">

	<link rel="icon" type="image/png" href="/static/images/favicon.ico">

	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ['Raleway', 'sans-serif'],
					},
				},
			},
		}
	</script>
	<script>
		async function loadProjects() {
			try {
				const response = await fetch('/static/json/projects.json');
				const projects = await response.json();

				const projectsGrid = document.getElementById('projects-grid');

				projects.forEach(project => {
					const projectCard = document.createElement('a');
					projectCard.href = project.link;
					projectCard.target = '_blank';
					projectCard.rel = 'noopener noreferrer';
					projectCard.className = 'shadow-2xl rounded-lg overflow-hidden';
					projectCard.innerHTML = `
								<div class="p-4">
									<h4 class="text-xl font-bold">${project.title}</h4>
									<p class="text-[#d9d9d9]">By: ${project.authors}</p>
									<p class="mt-2 text-[#d9d9d9]">${project.description}</p>
								</div>
							`;
					projectsGrid.appendChild(projectCard);
				});
			} catch (error) {
				console.error('Error loading projects:', error);
			}
		}

		document.addEventListener('DOMContentLoaded', loadProjects);
	</script>
</head>
<body class="font-sans antialiased bg-[#121212] text-[#d9d9d9]">
	<div class="bg-[#121212]">
		<!-- Header -->
		<header class="absolute inset-x-0 top-0 z-50">
			<nav class="flex items-center justify-center p-6 lg:px-8" aria-label="Global">
				<div class="flex items-center justify-between w-full lg:w-auto">
					<nav role="navigation" class="lg:hidden">
						<div id="menuToggle">
							<input type="checkbox" id="menuCheckbox" />
							<span></span>
							<span></span>
							<span></span>
							<ul id="menu">
								<li><a href="/index.html">Home</a></li>
								<li><a href="/html/about.html">About Us</a></li>
								<li><a href="/html/members.html">Members</a></li>
								<li><a href="/html/achievements.html">Achievements</a></li>
								<li><a href="/html/projects.html">Projects</a></li>
								<li><a href="https://github.com/Jossey28/IATech/pulls" target="_blank">Open a PR</a></li>
							</ul>
						</div>
				</div>
				<!-- Desktop navigation -->
				<div class="hidden lg:flex lg:gap-x-12 lg:justify-center items-center lg:flex">
					<a href="/index.html" class="text-sm lg:text-xl font-bold leading-6 text-[#d9d9d9] nav-link">Home</a>
					<a href="/html/about.html" class="text-sm lg:text-xl font-bold leading-6 text-[#d9d9d9] nav-link">About Us</a>
					<a href="/html/members.html" class="text-sm lg:text-xl font-bold leading-6 text-[#d9d9d9] nav-link">Members</a>
					<a href="/html/achievements.html" class="text-sm lg:text-xl font-bold leading-6 text-[#d9d9d9] nav-link">Achievements</a>
					<a href="/html/projects.html" class="text-sm lg:text-xl font-bold leading-6 text-[#d9d9d9] nav-link">Projects</a>
				</div>
			</nav>
		</header>
	</div>
	</header>

	<section id="projects" class="relative isolate overflow-hidden px-6 py-24 sm:py-32 lg:px-8">
		<ul role="list" class="divide-y divide-[#d9d9d9] mx-auto max-w-2xl lg:max-w-4xl">
			<div class="px-4 sm:px-0 text-center">
				<h3 class="text-3xl font-extrabold leading-9 text-[#d9d9d9] sm:text-4xl sm:leading-10">Projects</h3>
				<p class="mt-1 max-w-2xl text-sm leading-6 text-[#d9d9d9] mx-auto">Our members have accomplished incredible
					projects! Here are some of their favorites that they have worked on.</p>
			</div>

			<div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-4"></div>
		</ul>
	</section>

	<footer class="fixed inset-x-0 bottom-0 z-50 bg-[#121212]">
		<nav class="flex items-center justify-center p-6" aria-label="Global">
			<div class="flex gap-x-12">

					class="text-lg font-semibold leading-6 text-[#d9d9d9]">

				<a href="https://github.com/IATechEd" target="_blank" class="text-lg font-semibold leading-6 text-[#d9d9d9]">

</body>
