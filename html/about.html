			<figure class="mt-10">
				<blockquote class="text-left text-xl font-semibold leading-8 text-[#d9d9d9] sm:text-2xl sm:leading-9">
					<p>Welcome to the Central Campus Tech Club! We are a passionate group of students dedicated to exploring the
						world of technology, with a strong focus on cybersecurity. Our mission is to equip our members with the
						skills and knowledge needed to excel in the rapidly evolving tech landscape.</p>
					<br>
					<p>Located at Central Campus, our club is more than just a gathering of tech enthusiasts—it's a hub for
						innovation, collaboration, and competition. We regularly participate in cybersecurity competitions, striving
						to be the best and bring pride to our school.</p>
					<br>
					<p>Whether you're a seasoned coder or just beginning your journey in cybersecurity, our club offers something
						for everyone. Join us as we push the boundaries of what's possible in the digital world, learn together, and
						aim for excellence in every challenge we take on.</p>
				</blockquote>
